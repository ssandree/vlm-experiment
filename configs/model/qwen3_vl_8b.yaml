# configs/model/qwen3_vl_8b.yaml
# 서버: HuggingFace hub 캐시 레이아웃(models--*/snapshots/<hash>)
# 로컬에서 폴더 한 개에 직접 받았다면 qwen3_vl_8b_local.yaml + experiment 의 model 변경

name: Qwen3-VL-8B-Instruct
root: "Qwen3-VL-8B-Instruct/models--Qwen--Qwen3-VL-8B-Instruct/snapshots/0c351dd01ed87e9c1b53cbc748cba10e6187ff3b"

precision:
  dtype: float16

# HuggingFace generate() 인자 그대로 전달. do_sample: true 일 때만 temperature, top_p, top_k 적용
generation:
  max_new_tokens: 420   # grounding 시 다중 bbox JSON 출력 (128은 truncation으로 일부만 저장됨)
  do_sample: false
  repetition_penalty: 1.1   # 반복 토큰 억제 (없으면 "!!!!!!..." 같은 collapse 발생)
