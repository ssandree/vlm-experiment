# 로컬 PC용 예시. 사용법:
#   copy configs\paths.local.example.yaml configs\paths.local.yaml
#   (paths.local.yaml 은 .gitignore 되어 커밋되지 않음)
# 또는 한 번에:
#   set VLM_PATHS_FILE=configs\paths.local.example.yaml
#
# datasets_root 아래에 서버와 동일한 상대 경로(예: Classification_DB/...)를 두면
# test_dataset YAML을 수정하지 않고 서버·로컬을 바꿀 수 있습니다.
paths:
  model_root: C:/vlm-experiment/hf_models/
  datasets_root: C:/vlm-experiment
