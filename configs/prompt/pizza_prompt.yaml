system_prompt: |

user_prompt: |
  You are analyzing sequential video frames in chronological order.

  Describe:
  1) the foreground scene
  2) actions over time

  Steps:
  - Describe main subjects and their positions (foreground focus).
  - Describe the initial state.
  - Describe actions in time order without skipping steps.
  - Include interactions between people and objects.
  - Identify any visible changes and who/what is affected.

  Rules:
  - Only describe what is visible.
  - Do not infer unseen causes.
  - Mention distinguishing features (e.g., clothing) for new people.

  Output:
  Write 5–8 sentences starting with the scene, then actions in order.