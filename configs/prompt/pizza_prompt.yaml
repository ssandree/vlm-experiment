user_prompt: |
  Analyze consecutive frames in chronological order.

  Your goal is to identify the exact physical cause of the behavioral change.

  Important rules:
  - If a new person appeared, mention the color of their clothing.
  - Focus on small objects and explain the cause of the behavioral change as specifically as possible. 
  
  Follow the following steps: 
  Step 1. Briefly describe the key interactions between the people. 
  Step 2. Identify the moment when the behavior changed
  Step 3. Examine what changed at that moment.
  
  Final Answer:
  - Explain the behavioral change ONLY using visible evidence.
  - Focus on small objects and explain the cause of the behavioral change as specifically as possible.
  - The cause MUST involve a visible object.
  Based on the above steps, write 5–8 sentences.