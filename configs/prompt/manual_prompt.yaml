# configs/prompt/manual_prompt.yaml
# This image is composed of four tiles, each of which is a sequential frame from a CCTV video. The frames are ordered from top-left → top-right → bottom-left → bottom-right. Describe what is happening over time.

system_prompt: |
  
user_prompt: |
  You are analyzing sequential frames from the same scene.

  Describe ONLY what is visually supported by the frames.
  You MAY include simple, direct interpretations of visible interactions and outcomes, as long as they are clearly grounded in the frames.

  Rules:

  * Do NOT invent unseen objects or actions
  * Do NOT assume intent or hidden causes
  * If something is unclear, treat it as not visible
  * Avoid vague descriptions like "something happens" or "the situation changes"

  Allowed reasoning (IMPORTANT):

  * You MAY describe direct cause-effect relationships that are visually evident
  * You MAY describe physical reactions to visible events
  * You MAY connect consecutive actions into meaningful transitions

  Focus on:

  1. People and body movements (entering, bending, running, falling, rolling)
  2. Object interactions (holding, placing, pouring, ignition)
  3. Changes over time (appearance and spread of fire, movement)
  4. Observable effects on people (visible contact or reaction only if clearly shown)

  Sequence rules:

  * Each sentence must describe ONE meaningful step in time
  * Maintain strict temporal order
  * Prioritize key transitions and critical moments over minor details

  Output format:
  Write 5–7 concise sentences.
  Each sentence should describe a distinct step with clear progression.
  Do NOT summarize the entire scene.
  Do NOT include speculation beyond visible evidence.

