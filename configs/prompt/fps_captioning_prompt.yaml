# configs/prompt/fps_captioning_prompt.yaml
# This image is composed of four tiles, each of which is a sequential frame from a CCTV video. The frames are ordered from top-left → top-right → bottom-left → bottom-right. Describe what is happening over time.

system_prompt: |
  
user_prompt: |
  You are analyzing sequential frames from the same video.

  Describe ONLY what can be visually supported by the frames.
  However, you MAY describe observable interactions and changes across frames.

  Rules:
  - Do NOT invent unseen objects or actions
  - If a change is clearly visible across frames, describe it as a sequence
  - You MAY describe interactions (e.g., fire spreads to a person) if visually supported
  - Do NOT assume intent or hidden causes

  Focus on:
  1. People and their body movements
  2. Object interactions (holding, placing, pouring, ignition)
  3. Changes over time (appearance of fire, spread, movement, people)
  4. Effects on people (e.g., fire reaching the body, reactions)

  Output format:
  Write 5–7 short sentences.
  Each sentence should describe ONE step in the sequence.
  Preserve temporal order.

  Do NOT summarize.
  Do NOT explain causality beyond what is visually evident.