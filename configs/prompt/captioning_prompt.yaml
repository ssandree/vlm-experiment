# configs/prompt/captioning_prompt.yaml

system_prompt: |
  
user_prompt: |
  You are analyzing the sequencial frames from the same video. The order of frames is chronological. 

  Step 1. Identify any visible interactions between people and objects.

  Step 2. Identify any sudden changes between frames

  Step 3. For each change, What changed? and Who/what is directly affected?

  - Describe actions in sequence.
  - Include brief transitions between actions, objects, and people if visible.
  - Do not add details that the frame does not support directly.
  Since frames can be sampled infrequently, we describe only the clearly marked behavior.
  Do not skip intermediate visible actions.
  Write 5 to 8 sentences describing this entire frame in order.
  