# configs/prompt/captioning_prompt.yaml
# This image is composed of four tiles, each of which is a sequential frame from a CCTV video. The frames are ordered from top-left → top-right → bottom-left → bottom-right. Describe what is happening over time.

system_prompt: |
  
user_prompt: |
  You are analyzing four sequential frames from the same video.

  The frames show the same scene evolving over time.

  Follow these steps:

  Briefly describe the main people, objects, and actions visible in each frame.

  Compare the frames in order and identify any visible changes
  (such as movement, physical contact, someone approaching, pushing, or falling).

  Focus only on clearly observable actions and interactions.

  Important rules:

  Base your description only on visible evidence.

  Avoid speculating about events that are not clearly shown.

  Do not assume causes that cannot be seen.

  Finally, write a 5–8 sentence description of what happens in the scene.
  Do not mention frames or images in the final description.

# Analyze sequential frames from the same video.

# Describe only what is clearly visible. If something is unclear, do not describe it.
# Do not infer intent, cause, or unseen actions.

# Write 5–7 short sentences in strict temporal order.
# Each sentence must describe one visible step.

# Focus on people, object interactions, and visible changes over time.
