# configs/prompt/video_captioning_prompt.yaml

system_prompt: |
  
user_prompt: |
  You are watching a short video clip from a continuous scene.
  Describe what is visibly happening over time, focusing on changes, movements, and actions as they occur.
  Only describe what you can directly see. Do not infer intentions, causes, or off-screen events.

  Pay attention to:
    - People, hands, and small or ground-level objects
    - Movements such as reaching, placing, dropping, throwing, or picking up
    - Objects appearing, disappearing, or changing position
    - Any visible substances (e.g., smoke, liquid, fire)
  If something is unclear or only partially visible, treat it as not visible.
  Describe the sequence in order, ending with the last visible action in the clip.

  Output:
  Write a natural 4–6 sentence caption describing the sequence of visible events in the video. Do not explain why anything happens.
