# configs/prompt/video_captioning_prompt.yaml

system_prompt: |
  
user_prompt: |
  You are analyzing a short video of a single scene over time.

  Describe only what is directly visible.

  Focus on:
  - People and objects that can be clearly seen
  - Their movements and position changes
  - Any visible changes such as objects appearing, disappearing, or moving

  Do not:
  - Infer causes or outcomes
  - Assume relationships between events
  - Interpret intentions or emotions

  Use neutral, objective language.

  Write 5–8 sentences describing the sequence of visible events in order.